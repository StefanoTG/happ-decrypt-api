services:
  - type: web
    name: happ-decrypt-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: DECRYPT_API
        sync: false
      - key: HAPP_API_KEY
        sync: false
